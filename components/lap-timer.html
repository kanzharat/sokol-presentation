<!DOCTYPE html>
<!-- Motion-graphic component: live lap timer / digital stopwatch. Reusable in Sokol deck. -->
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lap Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--primary:#115ffc;--accent:#ff5733;--warm:#ff8c42;--ink:#f3f6ff;--muted:#8e97b6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--night);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;overflow:hidden}
@media (prefers-reduced-motion:reduce){.flag i{animation:none!important}}
.panel{position:relative;padding:clamp(20px,4vw,46px) clamp(28px,6vw,72px);border:1px solid rgba(122,140,200,.25);
  background:linear-gradient(135deg,#0c1020,#0a0a12);box-shadow:0 0 0 6px rgba(10,12,22,.5),0 30px 80px rgba(0,0,0,.5)}
.panel::before,.panel::after{content:"";position:absolute;width:18px;height:18px;border:2px solid var(--primary)}
.panel::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.panel::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
.head{display:flex;align-items:center;gap:.7em;font-family:'JetBrains Mono',monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);font-size:clamp(.55rem,1.4vw,.85rem);margin-bottom:clamp(10px,2vh,18px)}
.head i{width:.7em;height:.7em;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:.25}}
.time{font-family:'Orbitron';font-weight:900;font-size:clamp(2.2rem,9vw,5.6rem);color:var(--ink);line-height:1;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:.05em}
.time .ms{color:var(--primary);font-size:.5em}
.time .sep{color:var(--warm)}
.sub{display:flex;justify-content:space-between;margin-top:clamp(12px,2.2vh,20px);font-family:'JetBrains Mono',monospace;font-size:clamp(.5rem,1.3vw,.8rem);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.sub b{color:var(--ink)}
.flag{display:inline-flex;gap:2px;margin-left:.4em}
.flag i{width:6px;height:14px;background:var(--ink);opacity:.85}
.flag i:nth-child(odd){background:var(--accent)}
</style>
</head>
<body>
<div class="panel">
  <div class="head"><i></i>LIVE TIMING · SOKOL INTERNATIONAL CIRCUIT</div>
  <div class="time"><span id="t">0:00.000</span></div>
  <div class="sub"><span>BEST LAP <b id="best">1:42.318</b></span><span>SECTOR <b style="color:var(--primary)">3/3</b><span class="flag"><i></i><i></i><i></i><i></i></span></span></div>
</div>
<script>
const t=document.getElementById('t');let start=null;const cap=83000; // loops at ~1:23
function fmt(ms){const m=Math.floor(ms/60000),s=Math.floor(ms%60000/1000),mm=Math.floor(ms%1000);
  return m+':'+String(s).padStart(2,'0')+'.'+String(mm).padStart(3,'0');}
function loop(now){if(!start)start=now;let e=(now-start)%cap;t.textContent=fmt(e);requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
</html>
