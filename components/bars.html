<!DOCTYPE html>
<!-- Motion-graphic component: animated comparison bars (facilities). Reusable in Sokol deck. -->
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bars</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--primary:#115ffc;--accent:#ff5733;--warm:#ff8c42;--ink:#f3f6ff;--muted:#8e97b6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--night);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;overflow:hidden}
@media (prefers-reduced-motion:reduce){.fill{transition:none!important}}
.box{width:min(84vw,1100px);padding:clamp(16px,3vw,30px)}
.title{font-family:'Orbitron';font-weight:700;color:var(--ink);font-size:clamp(.9rem,2.4vw,1.7rem);letter-spacing:.06em;margin-bottom:clamp(14px,2.6vh,28px);display:flex;align-items:center;gap:.6em}
.title::before{content:"";width:1.6em;height:4px;background:var(--accent)}
.row{display:grid;grid-template-columns:clamp(90px,16vw,180px) 1fr auto;align-items:center;gap:clamp(10px,1.6vw,22px);margin:clamp(8px,1.6vh,16px) 0}
.name{font-family:'Inter';font-weight:500;color:#cfd5e6;font-size:clamp(.6rem,1.5vw,1rem)}
.track{height:clamp(14px,2.6vh,26px);background:rgba(122,140,200,.10);border-radius:30px;overflow:hidden;position:relative}
.fill{height:100%;width:0;border-radius:30px;transition:width 1.6s cubic-bezier(.2,.8,.2,1);background:linear-gradient(90deg,var(--primary),#4f8bff)}
.fill.org{background:linear-gradient(90deg,var(--warm),var(--accent))}
.val{font-family:'Orbitron';font-weight:700;color:var(--ink);font-size:clamp(.62rem,1.5vw,1.05rem);min-width:5.8em;text-align:right;font-variant-numeric:tabular-nums}
.val small{color:var(--muted);font-family:'Inter';font-weight:400;font-size:.7em;letter-spacing:.08em}
</style>
</head>
<body>
<div class="box">
  <div class="title">Объекты комплекса · Facilities</div>
  <div class="row"><span class="name">Кольцевая трасса</span><div class="track"><div class="fill" data-w="100"></div></div><span class="val"><b class="vn" data-v="4495">0</b><small> м</small></span></div>
  <div class="row"><span class="name">Картинг</span><div class="track"><div class="fill" data-w="37"></div></div><span class="val"><b class="vn" data-v="1650">0</b><small> м</small></span></div>
  <div class="row"><span class="name">Драг-стрип</span><div class="track"><div class="fill org" data-w="19"></div></div><span class="val"><b class="vn" data-v="866">0</b><small> м</small></span></div>
  <div class="row"><span class="name">Дрифт-арена</span><div class="track"><div class="fill org" data-w="62"></div></div><span class="val"><b class="vn" data-v="16000">0</b><small> м²</small></span></div>
</div>
<script>
const fills=[...document.querySelectorAll('.fill')];
const nums=[...document.querySelectorAll('.vn')];
const DUR=1600;
function easeOut(p){return 1-Math.pow(1-p,3);}
function run(){
  fills.forEach(f=>{f.style.transition='none';f.style.width='0';});
  nums.forEach(n=>n.textContent='0');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fills.forEach(f=>{f.style.transition='width '+DUR+'ms cubic-bezier(.2,.8,.2,1)';f.style.width=f.dataset.w+'%';});
    let t0=null;
    function tick(now){
      if(t0===null)t0=now;
      let p=Math.max(0,Math.min(1,(now-t0)/DUR));
      let e=easeOut(p);
      nums.forEach(n=>{n.textContent=Math.round((+n.dataset.v)*e).toLocaleString('ru-RU');});
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }));
}
run();setInterval(run,4600);
</script>
</body>
</html>
