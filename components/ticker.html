<!DOCTYPE html>
<!-- Motion-graphic component: kinetic marquee ticker of championships/facilities. Reusable in Sokol deck. -->
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--primary:#115ffc;--accent:#ff5733;--warm:#ff8c42;--ink:#f3f6ff}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--night);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2.4vh,26px);overflow:hidden;font-family:'Orbitron',sans-serif}
@media (prefers-reduced-motion:reduce){.tape{animation:none!important}}
.band{width:100%;overflow:hidden;position:relative;padding:clamp(10px,2.4vh,22px) 0;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
.tape{display:inline-flex;white-space:nowrap;will-change:transform}
.tape span{display:inline-flex;align-items:center;font-weight:900;text-transform:uppercase;letter-spacing:.06em;
  font-size:clamp(1rem,3.6vw,2.6rem);padding:0 .55em}
.b1{background:linear-gradient(90deg,#0e1530,#0a0a12);border-top:2px solid var(--primary);border-bottom:2px solid var(--primary)}
.b1 .tape{animation:scroll 18s linear infinite}
.b1 span{color:var(--ink)}
.b1 .sep{color:var(--primary)}
.b2{background:var(--primary)}
.b2 .tape{animation:scroll2 16s linear infinite}
.b2 span{color:#fff}.b2 .sep{color:var(--warm)}
.b3{background:linear-gradient(90deg,#1a0d08,#0a0a12);border-top:2px solid var(--accent);border-bottom:2px solid var(--accent)}
.b3 .tape{animation:scroll 22s linear infinite}
.b3 span{color:#e9d4c4}.b3 .sep{color:var(--accent)}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes scroll2{from{transform:translateX(-50%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div class="band b1"><div class="tape" id="t1"></div></div>
<div class="band b2"><div class="tape" id="t2"></div></div>
<div class="band b3"><div class="tape" id="t3"></div></div>
<script>
function build(id,items,sepChar){
  const el=document.getElementById(id);
  const one=items.map(x=>`<span>${x}</span><span class="sep">${sepChar}</span>`).join('');
  el.innerHTML=one+one; // duplicate for seamless loop
}
build('t1',['MOTOGP','FIM SUPERBIKE','WTCC','DTM','FORMULA E','WEC','SUPER FORMULA'],'◆');
build('t2',['SOKOL INTERNATIONAL CIRCUIT','ALMATY · KZ','SINCE 2026'],'///');
build('t3',['ДРИФТ','КАРТИНГ','ДРАГ-РЕЙСИНГ','ТРЕК-ДНИ','RACE HOTEL','МУЗЕЙ','ПЕЙНТБОЛ'],'•');
</script>
</body>
</html>
