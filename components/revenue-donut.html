<!DOCTYPE html>
<!-- Motion-graphic component: animated revenue-streams donut. Percentages are illustrative — edit data[]. -->
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revenue Donut</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--ink:#f4f5fa;--muted:#8a91a6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--night);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;overflow:hidden;color:var(--ink)}
.wrap{display:flex;align-items:center;gap:clamp(24px,5vw,70px);flex-wrap:wrap;justify-content:center;padding:20px}
.chart{position:relative;width:min(46vw,320px);aspect-ratio:1}
.chart svg{width:100%;height:100%;transform:rotate(-90deg)}
.seg{fill:none;stroke-width:26;transition:stroke-dasharray 1.1s cubic-bezier(.2,.8,.2,1)}
.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.center .v{font-family:'Orbitron';font-weight:900;font-size:clamp(1.6rem,5vw,2.8rem);line-height:1}
.center .l{font-family:'JetBrains Mono',monospace;font-size:clamp(.5rem,1.2vw,.78rem);letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-top:.5em}
.side h3{font-family:'Orbitron';font-weight:700;font-size:clamp(.9rem,2vw,1.4rem);margin-bottom:clamp(12px,2vh,20px);letter-spacing:.04em}
.side h3 small{display:block;font-family:'Inter';font-weight:300;color:var(--muted);font-size:.6em;letter-spacing:.18em;text-transform:uppercase;margin-top:.4em}
.leg{display:flex;flex-direction:column;gap:clamp(7px,1.4vh,12px)}
.row{display:flex;align-items:center;gap:11px;opacity:0;transform:translateX(-12px);animation:in .5s ease forwards}
.dot{width:13px;height:13px;border-radius:4px;flex:0 0 auto}
.row .n{font-size:clamp(.62rem,1.4vw,.95rem);color:#dfe3ee}
.row .p{margin-left:auto;font-family:'Orbitron';font-weight:700;font-size:clamp(.62rem,1.4vw,.95rem);font-variant-numeric:tabular-nums}
.note{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em}
@keyframes in{to{opacity:1;transform:translateX(0)}}
@media (prefers-reduced-motion:reduce){.seg{transition:none}.row{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="chart">
    <svg viewBox="0 0 200 200"><g id="segs"></g></svg>
    <div class="center"><div class="v" id="tot">0%</div><div class="l">источников: 6</div></div>
  </div>
  <div class="side">
    <h3>Доходные потоки<small>Revenue streams · пример</small></h3>
    <div class="leg" id="leg"></div>
    <div class="note">* доли иллюстративные — заменим на ваши цифры</div>
  </div>
</div>
<script>
const data=[
  {n:'Билеты и трибуны', p:28, c:'#115ffc'},
  {n:'Спонсорство и реклама', p:22, c:'#ff5733'},
  {n:'Аренда объектов', p:18, c:'#2aa8ff'},
  {n:'Отель и ресторан', p:14, c:'#ff8c42'},
  {n:'Картинг и развлечения', p:11, c:'#34d058'},
  {n:'VIP-зоны', p:7, c:'#8b7bff'},
];
const R=80,C=2*Math.PI*R,segG=document.getElementById('segs'),leg=document.getElementById('leg');
let segEls=[];
data.forEach((d,i)=>{
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',100);c.setAttribute('cy',100);c.setAttribute('r',R);
  c.setAttribute('class','seg');c.setAttribute('stroke',d.c);
  c.setAttribute('stroke-dasharray','0 '+C);
  segG.appendChild(c);segEls.push(c);
  leg.insertAdjacentHTML('beforeend',`<div class="row" style="animation-delay:${.6+i*.12}s"><span class="dot" style="background:${d.c}"></span><span class="n">${d.n}</span><span class="p">${d.p}%</span></div>`);
});
const tot=document.getElementById('tot');
function run(){
  let cum=0;
  segEls.forEach((c,i)=>{c.style.transition='none';c.setAttribute('stroke-dasharray','0 '+C);c.setAttribute('stroke-dashoffset',-(cum/100*C));cum+=data[i].p;});
  tot.textContent='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    let cu=0;
    segEls.forEach((c,i)=>{
      c.setAttribute('stroke-dashoffset',-(cu/100*C));
      setTimeout(()=>{c.style.transition='stroke-dasharray 1s cubic-bezier(.2,.8,.2,1)';c.setAttribute('stroke-dasharray',(data[i].p/100*C)+' '+C);},i*180);
      cu+=data[i].p;
    });
    // count center to 100
    const t0=performance.now(),dur=data.length*180+1000;
    (function tick(now){let p=Math.max(0,Math.min(1,(now-t0)/dur));tot.textContent=Math.round(100*p)+'%';if(p<1)requestAnimationFrame(tick);})(t0);
  }));
}
run();setInterval(run,5200);
</script>
</body>
</html>
