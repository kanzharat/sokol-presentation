<!DOCTYPE html>
<!-- Motion-graphic component: self-drawing big-ring circuit + traveling car dot. Shape matches Sokol map. -->
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--primary:#115ffc;--accent:#ff5733;--warm:#ff8c42;--ink:#f3f6ff;--muted:#8e97b6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--night);display:flex;align-items:center;justify-content:center;overflow:hidden}
@media (prefers-reduced-motion:reduce){.draw,.dot{animation:none!important;stroke-dashoffset:0!important}}
.scene{position:relative;width:min(82vw,82vh);aspect-ratio:1.15}
svg{width:100%;height:100%;overflow:visible}
.base{fill:none;stroke:rgba(122,140,200,.14);stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
.draw{fill:none;stroke:url(#tg);stroke-width:6;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:1;stroke-dashoffset:1;filter:drop-shadow(0 0 6px rgba(17,95,252,.55));animation:draw 5s ease-in-out infinite}
@keyframes draw{0%{stroke-dashoffset:1}45%{stroke-dashoffset:0}85%{stroke-dashoffset:0}100%{stroke-dashoffset:1}}
.pit{fill:#0f1420;stroke:var(--primary);stroke-width:2}
.dot{fill:#fff;filter:drop-shadow(0 0 9px var(--accent));
  offset-path:path('M150 320 C 70 322 48 300 60 272 C 70 248 96 250 108 228 C 95 214 92 186 120 178 C 152 169 168 196 196 196 C 230 196 256 188 270 214 C 282 236 266 258 244 262 C 222 266 214 286 230 298 C 214 312 188 306 178 292 C 168 278 150 286 150 320 Z');
  animation:run 5s ease-in-out infinite}
@keyframes run{0%{offset-distance:0%;opacity:0}6%{opacity:1}45%{offset-distance:100%;opacity:1}55%{opacity:0}100%{offset-distance:100%;opacity:0}}
.ttl{position:absolute;right:2%;top:0;font-family:'Orbitron';font-weight:700;color:var(--ink);font-size:clamp(.75rem,2vw,1.4rem);letter-spacing:.08em}
.ttl small{display:block;font-family:'JetBrains Mono';font-weight:400;color:var(--muted);font-size:.5em;letter-spacing:.2em;margin-top:.4em;text-align:right}
.cap{position:absolute;left:2%;bottom:0;font-family:'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--muted);font-size:clamp(.5rem,1.4vw,.85rem);text-transform:uppercase}
.cap b{color:var(--primary)}
</style>
</head>
<body>
<div class="scene">
  <div class="ttl">SOKOL CIRCUIT<small>BIG RING · БОЛЬШОЕ КОЛЬЦО</small></div>
  <svg viewBox="30 150 260 190">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#115ffc"/><stop offset=".55" stop-color="#4f8bff"/><stop offset="1" stop-color="#ff5733"/></linearGradient></defs>
    <path class="base" d="M150 320 C 70 322 48 300 60 272 C 70 248 96 250 108 228 C 95 214 92 186 120 178 C 152 169 168 196 196 196 C 230 196 256 188 270 214 C 282 236 266 258 244 262 C 222 266 214 286 230 298 C 214 312 188 306 178 292 C 168 278 150 286 150 320 Z"/>
    <path class="draw" pathLength="1" d="M150 320 C 70 322 48 300 60 272 C 70 248 96 250 108 228 C 95 214 92 186 120 178 C 152 169 168 196 196 196 C 230 196 256 188 270 214 C 282 236 266 258 244 262 C 222 266 214 286 230 298 C 214 312 188 306 178 292 C 168 278 150 286 150 320 Z"/>
    <rect class="pit" x="116" y="312" width="64" height="14" rx="2"/>
    <circle class="dot" r="6.5"/>
  </svg>
  <div class="cap"><b>4495 М</b> · 15 м ширина · Hermann Tilke</div>
</div>
</body>
</html>
